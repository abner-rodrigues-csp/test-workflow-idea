name: Sync Dynamic Branches

on:
  push:
    branches:
      - develop
  schedule:
    - cron: '0 0 */3 * *' # Roda a cada 3 dias à meia-noite

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          set +e  # Desativa saída em erro
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git fetch --all
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - name: Get dynamic branches
        id: get-branches
        run: |
          set +e  # Desativa saída em erro
          BRANCHES_JSON="[]"

          # Cria array temporário para branches
          declare -a FOUND_BRANCHES

          # Lista branches e procura por dynamic-deployment.yml
          while read -r branch; do
            BRANCH_NAME=$(echo "$branch" | sed 's/origin\///')
            if git ls-tree -r "$branch" | grep -q "dynamic-deployment.yml"; then
              FOUND_BRANCHES+=("$BRANCH_NAME")
            fi
          done < <(git for-each-ref --format='%(refname:short)' refs/remotes/origin/ | grep -v "develop\|master")

          # Se encontrou branches, cria JSON
          if [ ${#FOUND_BRANCHES[@]} -gt 0 ]; then
            BRANCHES_JSON="["
            for i in "${!FOUND_BRANCHES[@]}"; do
              [ $i -gt 0 ] && BRANCHES_JSON="$BRANCHES_JSON,"
              BRANCHES_JSON="$BRANCHES_JSON\"${FOUND_BRANCHES[$i]}\""
            done
            BRANCHES_JSON="$BRANCHES_JSON]"
            echo "Branches encontradas: ${FOUND_BRANCHES[*]}"
          fi

          echo "branches=$BRANCHES_JSON" >> $GITHUB_OUTPUT
          exit 0  # Força saída com sucesso

      - name: Process each branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set +e  # Desativa saída em erro

          # Função para notificações Slack
          send_slack_notification() {
            local message="$1"
            [ -n "$SLACK_WEBHOOK_URL" ] && curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$message\"}" "$SLACK_WEBHOOK_URL"
            return 0
          }

          # Verifica branches para processar
          BRANCHES='${{ steps.get-branches.outputs.branches }}'
          if [ "$BRANCHES" = "[]" ]; then
            echo "Nenhuma branch dinâmica encontrada"
            send_slack_notification "ℹ️ Nenhuma branch com arquivo dynamic-deployment.yml encontrada"
            exit 0
          fi

          # Prepara develop
          echo "Preparando develop..."
          git checkout develop || git checkout -b develop origin/develop

          # Flag para controlar se houve algum erro
          TEVE_ERRO=0

          # Processa cada branch
          echo "$BRANCHES" | jq -r '.[]' | while read -r branch; do
            echo "Processando: $branch"

            # Checkout da branch
            if ! git checkout -B "$branch" "origin/$branch"; then
              echo "Erro no checkout de $branch"
              TEVE_ERRO=1
              continue
            fi

            # Verifica se está atrás da develop
            BEHIND_COUNT=$(git rev-list --count "$branch..develop" 2>/dev/null || echo "0")
            if [ "$BEHIND_COUNT" = "0" ]; then
              echo "Branch $branch está atualizada"
              continue
            fi

            echo "Branch está $BEHIND_COUNT commits atrás"

            # Verifica conflitos
            BASE=$(git merge-base develop "$branch" 2>/dev/null || echo "")
            if [ -z "$BASE" ]; then
              echo "Erro ao encontrar base comum"
              TEVE_ERRO=1
              continue
            fi

            CONFLICTS=$(git merge-tree "$BASE" develop "$branch" | grep "^++<<<<<<< " || true)

            if [ -z "$CONFLICTS" ]; then
              echo "Tentando merge automático..."
              if git merge develop --no-edit && git push origin "$branch"; then
                send_slack_notification "✅ Merge automático realizado em \`$branch\`"
                continue
              fi
              git merge --abort || true
              TEVE_ERRO=1
            fi

            # Cria/atualiza PR
            PR_TITLE="🔄 Sync: Atualizar $branch com develop"
            PR_BODY="## Sincronização Automática

            Esta branch está $BEHIND_COUNT commit(s) atrás da develop.

            * Branch base: \`$branch\`
            * Branch origem: \`develop\`
            * Commits diferentes: $BEHIND_COUNT
            * Status: $([ -n "$CONFLICTS" ] && echo "⚠️ Conflitos detectados" || echo "Sem conflitos aparentes")

            Este PR foi criado automaticamente para manter sua branch atualizada."

            # Verifica PR existente
            PR_URL=$(gh pr list --base "$branch" --head develop --json url --jq '.[0].url' || echo "")

            if [ -z "$PR_URL" ]; then
              echo "Criando novo PR..."
              PR_URL=$(gh pr create --base "$branch" --head develop --title "$PR_TITLE" --body "$PR_BODY" --json url --jq '.url' || echo "")
              if [ -n "$PR_URL" ]; then
                send_slack_notification "🆕 Novo PR criado para \`$branch\`\nLink: $PR_URL"
              else
                TEVE_ERRO=1
              fi
            else
              echo "Atualizando PR existente..."
              PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
              if gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"; then
                send_slack_notification "♻️ PR atualizado para \`$branch\`\nLink: $PR_URL"
              else
                TEVE_ERRO=1
              fi
            fi
          done

          # Se houve algum erro durante o processo, sai com código 0 mesmo assim
          # já que os erros foram tratados individualmente
          exit 0
